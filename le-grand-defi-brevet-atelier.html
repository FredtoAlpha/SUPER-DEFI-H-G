<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>L'Atelier du Brevet — Histoire · Géographie · EMC</title>
<style>
:root{
  --bg:#141a28; --bg2:#1b2233; --panel:#202a3f;
  --card:#f6e7c8; --card2:#efe0bd; --ink:#1f2533; --muted:#5d6373;
  --line:#b8602a; --gold:#c79a3a; --red:#c0392b; --redd:#7d2017;
  --green:#2f8f5b; --greend:#1c5e3a; --cream:#f4e4bf; --dim:#8a93a7;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:radial-gradient(1200px 700px at 50% -150px,#243150 0%,var(--bg) 60%);
  color:var(--cream); min-height:100vh;
  font-family:ui-sans-serif,system-ui,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased; line-height:1.5;
}
#app{max-width:880px;margin:0 auto;padding:18px 16px 60px}
.serif{font-family:Georgia,"Iowan Old Style","Palatino Linotype",Palatino,"Times New Roman",serif}

/* ---- barre du haut ---- */
.bar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
.bar-l{display:flex;align-items:center;gap:10px;min-width:0}
.bar-r{display:flex;align-items:center;gap:10px}
.home-btn{background:var(--bg2);color:var(--cream);border:1px solid #38456a;border-radius:10px;
  width:40px;height:40px;font-size:20px;cursor:pointer;flex:0 0 auto}
.home-btn:hover{border-color:var(--gold)}
.mode-name{font-weight:700;color:var(--gold);font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.score{background:#1b2030;border:2px solid var(--gold);color:var(--cream);border-radius:999px;
  padding:6px 14px;font-weight:800;font-size:14px;white-space:nowrap}
.timer{background:#2a1414;border:2px solid var(--red);color:#ffd9d2;border-radius:999px;
  padding:6px 12px;font-weight:800;font-size:14px;font-variant-numeric:tabular-nums}
.dots{display:flex;gap:6px;justify-content:center;margin:-4px 0 14px;flex-wrap:wrap}
.dot{width:9px;height:9px;border-radius:50%;background:#33405f}
.dot.on{background:var(--green)} .dot.cur{background:var(--gold);box-shadow:0 0 0 3px rgba(199,154,58,.25)}

/* ---- carte ---- */
.card{background:var(--card);color:var(--ink);border:3px solid var(--line);border-radius:18px;
  padding:20px 20px 22px;box-shadow:0 12px 30px rgba(0,0,0,.35)}
.eyebrow{font-size:12px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;color:var(--red);margin-bottom:8px}
.prompt{font-size:20px;font-weight:700;margin-bottom:16px;white-space:pre-line;line-height:1.35}
.prompt.serif{font-size:22px}

/* ---- choix ---- */
.choices{display:flex;flex-direction:column;gap:10px}
.choice{display:block;width:100%;text-align:left;background:#fff;border:2px solid #d9c089;border-radius:12px;
  padding:13px 15px;font-size:16px;color:var(--ink);cursor:pointer;transition:.12s}
.choice:hover{border-color:var(--line);transform:translateY(-1px)}
.choice.good{background:#dff3e6;border-color:var(--green);font-weight:700}
.choice.bad{background:#fae0db;border-color:var(--red)}
.choice.dim{opacity:.55}
.choice:disabled{cursor:default}

/* ---- feedback ---- */
.fb{margin-top:14px}
.verdict{font-weight:800;font-size:16px;margin-bottom:6px}
.v-good{color:var(--greend)} .v-bad{color:var(--redd)}
.explain{background:#fff7e6;border-left:4px solid var(--gold);border-radius:8px;padding:11px 13px;font-size:15px;color:#4a4636}
.cont{margin-top:14px;background:var(--ink);color:var(--cream);border:none;border-radius:12px;
  padding:13px 20px;font-size:16px;font-weight:700;cursor:pointer;width:100%}
.cont:hover{background:#2c3550}
.cont:disabled{opacity:.4;cursor:default}
.ghost{background:transparent;border:2px solid #cbb481;color:#6a6244;border-radius:12px;padding:11px 14px;font-weight:700;cursor:pointer}
.row{display:flex;gap:10px;align-items:center;margin-top:12px}
.row .cont{margin-top:0;flex:1}

/* ---- chips / sélection ---- */
.chips,.pool{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:6px}
.chip{background:#fff;border:2px solid #d9c089;border-radius:999px;padding:9px 14px;font-size:15px;color:var(--ink);cursor:pointer}
.chip:hover{border-color:var(--line)}
.chip.sel{background:#eef3ff;border-color:#3b6fc0;box-shadow:0 0 0 3px rgba(59,111,192,.2)}
.chip.good{background:#dff3e6;border-color:var(--green);font-weight:700}
.chip.bad{background:#fae0db;border-color:var(--red)}
.chip.placed{cursor:pointer}

/* ---- colonnes (classement) ---- */
.cols{display:flex;gap:12px;margin:6px 0 4px}
.col{flex:1;background:#fff;border:2px dashed #cbb481;border-radius:12px;padding:10px;min-height:90px}
.col:hover{border-color:var(--line)}
.col-h{font-weight:800;font-size:13px;color:var(--redd);margin-bottom:8px;text-align:center}
.col .chip{display:block;margin:6px 0;text-align:center}

/* ---- remise en ordre ---- */
.seq{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.seqitem{display:flex;align-items:center;gap:10px;background:#fff;border:2px solid #d9c089;border-radius:10px;padding:10px 12px;font-size:15px}
.seqitem.good{background:#dff3e6;border-color:var(--green)}
.num{flex:0 0 auto;width:26px;height:26px;border-radius:50%;background:var(--ink);color:var(--cream);
  display:grid;place-items:center;font-weight:800;font-size:13px}

/* ---- associations ---- */
.match{display:flex;gap:12px;margin:6px 0}
.mcol{flex:1;display:flex;flex-direction:column;gap:8px}
.mitem{text-align:left;background:#fff;border:2px solid #d9c089;border-radius:10px;padding:11px 12px;font-size:14px;color:var(--ink);cursor:pointer}
.mitem:hover{border-color:var(--line)}
.mitem.sel{background:#eef3ff;border-color:#3b6fc0}
.mitem.done{background:#fbf3dd;border-color:var(--gold)}
.mitem.used{opacity:.4}
.arrow{color:var(--red);font-weight:700;font-size:13px}
.match-correct .mrow{background:#fff;border:1px solid #e0cd9a;border-radius:8px;padding:8px 10px;margin:6px 0;font-size:14px}

/* ---- document / situation ---- */
.doc{background:#fffdf6;border:1px solid #e3d4ab;border-left:5px solid var(--line);border-radius:10px;
  padding:14px 16px;margin-bottom:16px;position:relative}
.doc-type{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--line)}
.doc-theme{display:inline-block;background:#f3e2bd;border:1px solid var(--gold);color:#8a6d1f;font-size:10px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;border-radius:999px;padding:3px 9px;margin-bottom:7px}
.doc-title{font-weight:800;font-size:17px;margin:2px 0 8px;color:var(--ink)}
.doc-text{font-size:15.5px;color:#3a3a3a;line-height:1.55;font-family:Georgia,serif}
.doc-source{margin-top:9px;font-size:12px;font-style:italic;color:var(--muted)}
.schema-wrap{margin-bottom:14px;text-align:center}
.cro{width:100%;max-width:360px;height:auto;border:1px solid #d9c089;border-radius:10px}

/* ---- rédaction ---- */
.write{width:100%;border:2px solid #d9c089;border-radius:12px;padding:12px;font-size:15px;font-family:inherit;color:var(--ink);resize:vertical;background:#fff}
.write:focus{outline:none;border-color:var(--line)}
.model-h{font-weight:800;color:var(--redd);font-size:13px;text-transform:uppercase;letter-spacing:.08em;margin:14px 0 6px}
.model{background:#fff7e6;border-left:4px solid var(--green);border-radius:8px;padding:12px 14px;font-size:15px;color:#3f4030;font-family:Georgia,serif;line-height:1.55}
.grid-h{font-weight:800;margin:14px 0 6px;font-size:14px;color:var(--ink)}
.grid{margin:0;padding-left:20px;font-size:14.5px;color:#444}
.grid li{margin:4px 0}
.selfrate{margin-top:14px;font-weight:700;color:var(--ink);display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.rate{background:var(--ink);color:var(--cream);border:none;border-radius:10px;padding:10px 16px;font-weight:700;font-size:14px;cursor:pointer}
.rate:hover{background:#2c3550}

/* ---- accueil ---- */
.hero{text-align:center;padding:18px 6px 8px}
.kicker{color:var(--gold);font-weight:800;letter-spacing:.18em;text-transform:uppercase;font-size:12px}
.hero h1{font-size:34px;margin:8px 0 6px;color:var(--cream);line-height:1.1}
.hero .pen{color:var(--red)}
.hero p{color:var(--dim);max-width:560px;margin:0 auto;font-size:15px}
.modes{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-top:22px}
.mode-card{background:var(--card);color:var(--ink);border:3px solid var(--line);border-radius:16px;
  padding:16px;text-align:left;cursor:pointer;transition:.14s;display:flex;flex-direction:column;gap:4px}
.mode-card:hover{transform:translateY(-3px);box-shadow:0 14px 26px rgba(0,0,0,.3)}
.mc-num{font-size:12px;font-weight:800;color:var(--red);letter-spacing:.1em}
.mc-title{font-size:19px;font-weight:800}
.mc-desc{font-size:13.5px;color:#5a5644}
.mode-card.exam{grid-column:1 / -1;background:#221016;border-color:var(--red);color:var(--cream)}
.mode-card.exam .mc-title{color:#ffd9d2} .mode-card.exam .mc-desc{color:#d6a59c} .mode-card.exam .mc-num{color:var(--gold)}
.foot{text-align:center;color:#56607a;font-size:12px;margin-top:24px}

/* ---- bilan ---- */
.bilan{text-align:center}
.big-score{font-size:46px;font-weight:800;color:var(--line);margin:6px 0}
.appver{position:fixed;right:12px;bottom:12px;z-index:99;background:#1b2030;color:#f4e4bf;border:2px solid var(--gold);
  border-radius:999px;padding:6px 13px;font:700 12px/1 ui-monospace,monospace}

@media(max-width:560px){
  .modes{grid-template-columns:1fr}
  .cols,.match{flex-direction:column}
  .hero h1{font-size:27px}
  .prompt{font-size:18px}
}

/* ---- réponse à corriger ---- */
.copie{background:#fffdf8;border:1px solid #e3d4ab;border-radius:10px;padding:13px 15px;margin-bottom:14px;
  background-image:repeating-linear-gradient(#fffdf8,#fffdf8 27px,#efe3c4 28px)}
.copie-h{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--red);margin-bottom:6px}
.copie-t{font-family:Georgia,serif;font-size:15.5px;color:#444;font-style:italic;line-height:28px}
.sub{font-weight:700;color:var(--ink);margin:4px 0 10px;font-size:15px}

/* ---- bulletin du brevet ---- */
.hundred{font-size:22px;color:var(--muted);font-weight:700}
.bullet{margin-top:8px;display:flex;flex-direction:column;gap:10px}
.brow{display:flex;align-items:center;gap:10px}
.blab{flex:0 0 42%;font-weight:700;font-size:14px;color:var(--ink)}
.blab em{color:var(--muted);font-style:normal;font-weight:800}
.bbar{flex:1;height:14px;background:#e7d7b0;border-radius:999px;overflow:hidden}
.bfill{display:block;height:100%;border-radius:999px;transition:width .5s}
.bf-good{background:var(--green)} .bf-mid{background:var(--gold)} .bf-low{background:var(--red)}
.bpct{flex:0 0 42px;text-align:right;font-weight:800;font-size:14px;color:var(--ink)}

/* ---- quiz de classe (projection) ---- */
.cq-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
.cq-phase{background:var(--gold);color:#1b2030;font-weight:800;letter-spacing:.07em;text-transform:uppercase;font-size:13px;border-radius:999px;padding:7px 16px}
.cq-phase.corr{background:var(--red);color:#fff}
.cq-phase.win{background:#1b2030;color:var(--gold);border:2px solid var(--gold)}
.cq-counter{font-weight:800;font-size:20px;color:var(--cream)}
.cq-timerwrap{display:flex;justify-content:center;margin-bottom:12px}
.cq-timer{min-width:78px;text-align:center;font-weight:800;font-size:36px;color:var(--cream);background:#1b2030;border:3px solid var(--gold);border-radius:16px;padding:6px 20px;font-variant-numeric:tabular-nums}
.cq-timer.cq-hot{border-color:var(--red);color:#ffd9d2}
.cq-timer.cq-done{background:#2a1414;border-color:var(--red);color:#ffd9d2;font-size:24px}
.cq-card{background:var(--card);color:var(--ink);border:3px solid var(--line);border-radius:18px;padding:26px 24px;box-shadow:0 12px 30px rgba(0,0,0,.35)}
.cq-q{font-family:Georgia,serif;font-size:30px;font-weight:800;line-height:1.25;margin-bottom:22px;text-align:center}
.cq-opts{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.cq-opt{display:flex;align-items:center;gap:14px;background:#fff;border:2px solid #d9c089;border-radius:14px;padding:16px 18px;font-size:20px}
.cq-letter{flex:0 0 auto;width:42px;height:42px;border-radius:50%;background:var(--ink);color:var(--cream);display:grid;place-items:center;font-weight:800;font-size:20px}
.cq-text{flex:1}
.cq-opt.cq-ok{background:#dff3e6;border-color:var(--green);font-weight:700}
.cq-opt.cq-ok .cq-letter{background:var(--green)}
.cq-check{color:var(--greend);font-weight:800;font-size:26px}
.cq-explain{margin-top:18px;background:#fff7e6;border-left:4px solid var(--gold);border-radius:8px;padding:13px 15px;font-size:17px;color:#4a4636}
.cq-nav,.cq-nav2{display:flex;gap:12px;margin-top:18px;justify-content:flex-end;flex-wrap:wrap}
.cq-nav2{justify-content:center}
.cq-btn{background:var(--ink);color:var(--cream);border:none;border-radius:14px;padding:15px 26px;font-size:18px;font-weight:800;cursor:pointer}
.cq-btn:hover{background:#2c3550}
.cq-btn:disabled{opacity:.4;cursor:default}
.cq-btn.ghost2{background:transparent;border:2px solid #44507a;color:var(--cream)}
.cq-btn.lite{background:#fff;border:2px solid #d9c089;color:var(--ink)}
.cq-btn.lite:hover{background:#fffdf6;border-color:var(--line)}
.cq-hint{text-align:center;color:#56607a;font-size:13px;margin-top:10px}
.cq-setup-p{color:#5a5644;font-size:15px;margin:0 0 14px}
.cq-count{text-align:center}
.cq-count-q{font-size:22px;font-weight:700;color:var(--muted)}
.cq-count-n{font-size:90px;font-weight:800;color:var(--line);line-height:1.05}
.cq-count-tot{font-size:34px;color:var(--muted)}
.cq-count-h{font-size:20px;font-weight:700;margin-bottom:6px}
.cq-champ{text-align:center}
.cq-trophy{font-size:64px;line-height:1}
.cq-champ-h{font-size:22px;font-weight:800;color:var(--red);text-transform:uppercase;letter-spacing:.06em;margin:4px 0 14px}
.cq-name{width:100%;max-width:420px;border:2px solid #d9c089;border-radius:12px;padding:14px;font-size:20px;text-align:center;font-family:inherit;color:var(--ink)}
.cq-champ-score{margin:12px 0;font-weight:700;color:var(--muted);font-size:18px}
.cq-winner-name{font-family:Georgia,serif;font-size:40px;font-weight:800;color:var(--line);margin:18px 0 6px;line-height:1.15}
.cq-confetti{font-size:40px}
.mode-card.classquiz{grid-column:1 / -1;background:#1c2335;border-color:var(--gold);color:var(--cream)}
.mode-card.classquiz .mc-title{color:var(--gold)} .mode-card.classquiz .mc-desc{color:#b9c2d8} .mode-card.classquiz .mc-num{color:#d8b24a}
@media(max-width:560px){ .cq-opts{grid-template-columns:1fr} .cq-q{font-size:24px} .cq-count-n{font-size:64px} }
</style>
</head>
<body>
<div id="app"></div>
<div class="appver" id="appver">v7</div>
<script>
"use strict";
var app=document.getElementById("app");

/* ============ SON (Web Audio, aucun fichier) ============ */
var actx=null;
function beep(f,d,type,when,gain){ if(!actx)return; var o=actx.createOscillator(),g=actx.createGain();
  o.type=type||"sine";o.frequency.value=f;o.connect(g);g.connect(actx.destination);
  var t=actx.currentTime+(when||0);g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(gain||0.2,t+0.012);g.gain.exponentialRampToValueAtTime(0.0001,t+d);
  o.start(t);o.stop(t+d+0.03); }
function sound(kind){ try{ if(!actx)actx=new (window.AudioContext||window.webkitAudioContext)();
  if(actx.state==="suspended")actx.resume();
  if(kind===true||kind==="good"){beep(660,0.12,"triangle",0);beep(990,0.16,"triangle",0.10);}
  else if(kind===false||kind==="bad"){beep(170,0.24,"sawtooth",0,0.16);}
  else if(kind==="win"){[523,659,784,1047].forEach(function(f,i){beep(f,0.2,"triangle",i*0.12);});}
}catch(e){} }

/* ============ utilitaires ============ */
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function pick(a,n){return shuffle(a).slice(0,n);}
function fmt(s){if(s<0)s=0;var m=Math.floor(s/60),x=s%60;return m+":"+(x<10?"0":"")+x;}

/* ============ état + séquence ============ */
var S={score:0,steps:[],i:0,label:"",onEnd:null,timer:false,timeLeft:0,iv:null,brevet:null};
function startTimer(){ S.iv=setInterval(function(){ S.timeLeft--; var t=document.getElementById("timer");
  if(t)t.textContent=fmt(S.timeLeft); if(S.timeLeft<=0){stopTimer();bilan(true);} },1000); }
function stopTimer(){ if(S.iv){clearInterval(S.iv);S.iv=null;} S.timer=false; }
function runSequence(label,steps,onEnd){ S.score=0;S.steps=steps;S.i=0;S.label=label;S.onEnd=onEnd||function(){bilan(false);}; nextStep(); }
function nextStep(){ if(S.i>=S.steps.length){ S.onEnd(); return; } S.steps[S.i](function(pts){ S.score+=(pts||0); S.i++; window.scrollTo(0,0); nextStep(); }); }

function header(){
  var prog="";
  if(S.steps.length){ prog='<div class="dots">'; for(var k=0;k<S.steps.length;k++){ prog+='<span class="dot'+(k<S.i?" on":(k===S.i?" cur":""))+'"></span>'; } prog+='</div>'; }
  var timer=S.timer?'<div class="timer" id="timer">'+fmt(S.timeLeft)+'</div>':'';
  return '<div class="bar"><div class="bar-l"><button class="home-btn" data-act="home" title="Accueil">‹</button>'
    +'<span class="mode-name">'+esc(S.label)+'</span></div>'
    +'<div class="bar-r">'+timer+'<span class="score">'+S.score+' pts</span></div></div>'+prog;
}
document.addEventListener("click",function(e){ var h=e.target.closest("[data-act=home]"); if(h){stopTimer();home();} });

/* ============ PRIMITIVES ============ */
function showMCQ(cfg,done){
  var h=header()+'<div class="card">';
  if(cfg.docHtml)h+=cfg.docHtml;
  if(cfg.eyebrow)h+='<div class="eyebrow">'+esc(cfg.eyebrow)+'</div>';
  h+='<div class="prompt">'+cfg.prompt+'</div><div class="choices">';
  cfg.choices.forEach(function(c,i){h+='<button class="choice" data-i="'+i+'">'+esc(c)+'</button>';});
  h+='</div><div class="fb" id="fb"></div></div>'; app.innerHTML=h;
  var ans=false;
  app.querySelectorAll(".choice").forEach(function(b){ b.onclick=function(){ if(ans)return; ans=true;
    var i=+b.dataset.i, ok=(i===cfg.answer);
    app.querySelectorAll(".choice").forEach(function(x,j){ x.disabled=true;
      x.classList.add(j===cfg.answer?"good":(j===i?"bad":"dim")); });
    sound(ok);
    var fb=document.getElementById("fb");
    fb.innerHTML='<div class="verdict '+(ok?"v-good":"v-bad")+'">'+(ok?"Bonne réponse !":"Pas tout à fait.")+'</div>'
      +(cfg.explain?'<div class="explain">'+cfg.explain+'</div>':'')
      +'<button class="cont" id="cont">Continuer ›</button>';
    document.getElementById("cont").onclick=function(){done(ok?10:0);};
  };});
}

function showMultiSelect(cfg,done){
  var chosen={};
  function render(){
    var h=header()+'<div class="card"><div class="eyebrow">'+esc(cfg.eyebrow)+'</div><div class="prompt">'+cfg.prompt+'</div><div class="chips">';
    cfg.items.forEach(function(it,i){h+='<button class="chip'+(chosen[i]?" sel":"")+'" data-i="'+i+'">'+esc(it.t)+'</button>';});
    h+='</div><button class="cont" id="val">Valider mes choix</button><div class="fb" id="fb"></div></div>'; app.innerHTML=h;
    app.querySelectorAll(".chip").forEach(function(b){b.onclick=function(){var i=+b.dataset.i;chosen[i]=!chosen[i];render();};});
    document.getElementById("val").onclick=score;
  }
  function score(){
    var net=0,total=0;
    cfg.items.forEach(function(it,i){ if(it.good){total++; if(chosen[i])net++;} else if(chosen[i])net--; });
    app.querySelectorAll(".chip").forEach(function(b,i){ b.disabled=true;

function showOrder(cfg,done){
  var seq=[];
  function render(){
    var h=header()+'<div class="card"><div class="eyebrow">'+esc(cfg.eyebrow)+'</div><div class="prompt">'+cfg.prompt+'</div><div class="seq">';
    seq.forEach(function(i,pos){h+='<div class="seqitem"><span class="num">'+(pos+1)+'</span>'+esc(cfg.items[i].t)+'</div>';});
    h+='</div><div class="pool">';
    cfg.items.forEach(function(it,i){ if(seq.indexOf(i)<0)h+='<button class="chip" data-i="'+i+'">'+esc(it.t)+'</button>'; });
    h+='</div><div class="row"><button class="ghost" id="undo">↶ Retirer</button>'
      +'<button class="cont" id="val"'+(seq.length===cfg.items.length?"":" disabled")+'>Valider l\'ordre</button></div>'
      +'<div class="fb" id="fb"></div></div>'; app.innerHTML=h;
    app.querySelectorAll(".pool .chip").forEach(function(b){b.onclick=function(){seq.push(+b.dataset.i);render();};});
    document.getElementById("undo").onclick=function(){seq.pop();render();};
    var v=document.getElementById("val"); if(v&&!v.disabled)v.onclick=score;
  }
  function score(){
    var n=0; seq.forEach(function(i,pos){ if(cfg.items[i].r===pos+1)n++; });
    var perfect=(n===cfg.items.length);

    var ordered=cfg.items.map(function(it){return it;}).sort(function(a,b){return a.r-b.r;});
    var h=header()+'<div class="card"><div class="eyebrow">'+esc(cfg.eyebrow)+'</div><div class="prompt">'+(perfect?"Parfait !":"L'ordre attendu :")+'</div><div class="seq">';
    ordered.forEach(function(o,pos){h+='<div class="seqitem good"><span class="num">'+(pos+1)+'</span>'+esc(o.t)+'</div>';});
    h+='</div><div class="explain">'+n+' / '+cfg.items.length+' bien placé(s).</div><button class="cont" id="cont">Continuer ›</button></div>';
    app.innerHTML=h; document.getElementById("cont").onclick=function(){done(perfect?15:n*2);};

  render();

function showMatch(cfg,done){
  var left=cfg.pairs.map(function(p){return p[0];});
  var right=shuffle(cfg.pairs.map(function(p){return p[1];}));
  var sel=null,link={};
  function render(){
    var h=header()+'<div class="card"><div class="eyebrow">'+esc(cfg.eyebrow)+'</div><div class="prompt">'+cfg.prompt+'</div>';
    if(cfg.svg)h+='<div class="schema-wrap">'+cfg.svg+'</div>';
    h+='<div class="match"><div class="mcol">';
    left.forEach(function(l,i){h+='<button class="mitem'+(sel===i?" sel":"")+(link[i]?" done":"")+'" data-l="'+i+'">'+esc(l)+(link[i]?' <span class="arrow">→ '+esc(link[i])+'</span>':'')+'</button>';});
    h+='</div><div class="mcol">';
    right.forEach(function(r,j){ var used=false; for(var k in link){if(link[k]===r)used=true;}
      h+='<button class="mitem'+(used?" used":"")+'" data-r="'+j+'"'+(used?" disabled":"")+'>'+esc(r)+'</button>'; });
    h+='</div></div><button class="cont" id="val"'+(Object.keys(link).length===left.length?"":" disabled")+'>Valider</button><div class="fb" id="fb"></div></div>';
    app.innerHTML=h;
    app.querySelectorAll("[data-l]").forEach(function(b){b.onclick=function(){var i=+b.dataset.l; if(link[i]){delete link[i];sel=null;render();return;} sel=i;render();};});
    app.querySelectorAll("[data-r]").forEach(function(b){b.onclick=function(){ if(sel===null||b.disabled)return; link[sel]=right[+b.dataset.r];sel=null;render(); };});
    var v=document.getElementById("val"); if(v&&!v.disabled)v.onclick=score;
  }
  function score(){
    var n=0; left.forEach(function(l,i){ var corr; cfg.pairs.forEach(function(p){if(p[0]===l)corr=p[1];}); if(link[i]===corr)n++; });
    sound(n===left.length);
    var h=header()+'<div class="card"><div class="eyebrow">'+esc(cfg.eyebrow)+'</div><div class="prompt">Correction de la légende</div><div class="match-correct">';
    cfg.pairs.forEach(function(p){h+='<div class="mrow"><b>'+esc(p[0])+'</b> → '+esc(p[1])+'</div>';});
    h+='</div><div class="explain">'+n+' / '+left.length+' bonne(s) association(s).</div><button class="cont" id="cont">Continuer ›</button></div>';
    app.innerHTML=h; document.getElementById("cont").onclick=function(){done(n*5);};
  }
  render();
}

/* ============ CONSTRUCTEURS DE MODES ============ */
function docHtml(d){ return '<div class="doc">'+(d.theme?'<div class="doc-theme">'+esc(d.theme)+'</div>':'')+'<div class="doc-type">'+esc(d.type)+'</div><div class="doc-title">'+esc(d.titre)+'</div><div class="doc-text">'+d.texte+'</div><div class="doc-source">'+d.source+'</div></div>'; }
function mcqStep(it,eyebrow){ return function(done){ showMCQ({eyebrow:eyebrow||"Repère",prompt:it.q,choices:it.c,answer:it.a,explain:it.e},done); }; }
function orderStep(it){ return function(done){ showOrder({eyebrow:"Dans l'ordre",prompt:it.titre,items:it.ev.map(function(e){return {t:e.t,r:e.r};})},done); }; }

function docSteps(d){ var dh=docHtml(d); return [
 function(done){showMCQ({docHtml:dh,eyebrow:"1 · Identifier le document",prompt:d.nature.q,choices:d.nature.c,answer:d.nature.a,explain:d.nature.e},done);},
 function(done){showMCQ({docHtml:dh,eyebrow:"2 · Prélever une information",prompt:d.prelever.q,choices:d.prelever.c,answer:d.prelever.a,explain:d.prelever.e},done);},
 function(done){showMCQ({docHtml:dh,eyebrow:"3 · Expliquer avec le cours",prompt:d.expliquer.q,choices:d.expliquer.c,answer:d.expliquer.a,explain:d.expliquer.e},done);},
 function(done){showWrite({docHtml:dh,eyebrow:"4 · Rédiger",prompt:d.rediger.q,model:d.rediger.model},done);}
];}

function longueSteps(s){
 var model=s.paragraphe.slice().sort(function(a,b){return a.r-b.r;}).map(function(p){return p.t;}).join(" ");
 return [
 function(done){showMultiSelect({eyebrow:"Étape 1 · Trier les idées",prompt:"Sujet : « "+s.sujet+" »\nChoisis seulement les idées utiles (écarte le hors-sujet).",items:s.idees.map(function(x){return {t:x.t,good:x.part!==null};}),explain:"On garde les idées qui répondent vraiment au sujet."},done);},
 function(done){showClassify({eyebrow:"Étape 2 · Construire le plan",prompt:"Classe chaque idée utile dans la bonne partie.",cats:s.parties,items:s.idees.filter(function(x){return x.part!==null;}).map(function(x){return {t:x.t,cat:x.part};})},done);},
 function(done){showOrder({eyebrow:"Étape 3 · Rédiger un paragraphe",prompt:"Remets les phrases dans l'ordre : idée → explication → exemple → bilan.",items:s.paragraphe.map(function(p){return {t:p.t,r:p.r};})},done);},
 function(done){showWrite({eyebrow:"Étape 4 · Se relire",prompt:"Compare ton paragraphe avec un modèle, puis vérifie-le avec la grille.",model:model,checklist:["Le sujet est-il bien traité ?","Le plan est-il clair (2 parties) ?","Y a-t-il des exemples et des dates ?","As-tu utilisé des connecteurs (d'abord, ensuite, ainsi) ?","Y a-t-il une phrase de conclusion ?"]},done);}
];}

function emcSteps(e){ var dh='<div class="doc"><div class="doc-type">Situation pratique</div><div class="doc-text">'+esc(e.sit)+'</div></div>'; return [
 function(done){showMCQ({docHtml:dh,eyebrow:"1 · Les acteurs",prompt:e.acteurs.q,choices:e.acteurs.c,answer:e.acteurs.a,explain:e.acteurs.e},done);},
 function(done){showMCQ({docHtml:dh,eyebrow:"2 · Le problème",prompt:e.probleme.q,choices:e.probleme.c,answer:e.probleme.a,explain:e.probleme.e},done);},
 function(done){showMCQ({docHtml:dh,eyebrow:"3 · Le droit / la valeur",prompt:e.valeur.q,choices:e.valeur.c,answer:e.valeur.a,explain:e.valeur.e},done);},
 function(done){showMCQ({docHtml:dh,eyebrow:"4 · La solution",prompt:e.solution.q,choices:e.solution.c,answer:e.solution.a,explain:e.solution.e},done);},
 function(done){showWrite({docHtml:dh,eyebrow:"5 · Justifier",prompt:e.justification.q,model:e.justification.model},done);}
];}

function croquisSteps(c){ return [
 function(done){showMCQ({eyebrow:"1 · Trouver le titre",docHtml:'<div class="schema-wrap">'+c.svg+'</div>',prompt:"Quel titre convient à ce croquis ?",choices:c.titres,answer:c.titreA,explain:c.titreE},done);},
 function(done){showMatch({eyebrow:"2 · Compléter la légende",prompt:"Associe chaque élément du croquis à sa signification.",svg:c.svg,pairs:c.legende},done);}
];}

var _last={};
function pickFresh(arr,key){ if(arr.length<2)return arr[0]; var i; do{i=Math.floor(Math.random()*arr.length);}while(i===_last[key]); _last[key]=i; return arr[i]; }
function startRepere(){ var steps=pick(REP_MCQ,8).map(function(it){return mcqStep(it,"Repère");}); steps.push(orderStep(pickFresh(REP_ORDER,"ord"))); runSequence("Repères",steps); }
function startDoc(){ runSequence("Doc Express",docSteps(pickFresh(DOCS,"doc"))); }
function startLongue(){ runSequence("Réponse longue",longueSteps(pickFresh(LONGUE,"long"))); }
function startCroquis(){ runSequence("Croquis / schéma",croquisSteps(pickFresh(CROQUIS,"cro"))); }
function startEMC(){ runSequence("EMC · situation pratique",emcSteps(pickFresh(EMC,"emc"))); }
function corrigeSteps(){ return pick(CORRIGE,4).map(function(it){ return function(done){ showCorrige(it,done); }; }); }
function startCorrige(){ runSequence("Réponse à corriger",corrigeSteps()); }

  S.brevet={sec:[
    {label:"Repères & langages",w:10,max:50+10+cro.legende.length*5,earned:0},
    {label:"Étude de document",w:25,max:30,earned:0},
    {label:"Rédaction",w:25,max:16,earned:0},
    {label:"Connaissances",w:30,max:connMax,earned:0},
    {label:"EMC",w:10,max:48,earned:0}
  ]};
  var ds=docSteps(doc), ls=longueSteps(lng), es=emcSteps(emcd), cs=croquisSteps(cro);
  var steps=[];
  pick(REP_MCQ,5).forEach(function(it){ steps.push(brevetStep(0,mcqStep(it,"Repère"))); });
  steps.push(brevetStep(1,ds[0])); steps.push(brevetStep(1,ds[1])); steps.push(brevetStep(1,ds[2]));
  steps.push(brevetStep(2,ds[3]));
  steps.push(brevetStep(0,cs[0])); steps.push(brevetStep(0,cs[1]));
  steps.push(brevetStep(3,ls[0])); steps.push(brevetStep(3,ls[1])); steps.push(brevetStep(3,ls[2]));
  steps.push(brevetStep(2,ls[3]));
  es.forEach(function(s){ steps.push(brevetStep(4,s)); });
  S.timer=true; S.timeLeft=20*60;
  runSequence("Brevet blanc",steps,brevetBilan);
  startTimer();
}

/* ============ QUIZ DE CLASSE (à projeter) ============ */
var CQ={active:false,q:[],i:0,phase:"quiz",n:15,secs:30,tleft:0,iv:null,top:0,winStage:"count"};
function cqStopTimer(){ if(CQ.iv){clearInterval(CQ.iv);CQ.iv=null;} }
function cqStartTimer(){ cqStopTimer(); CQ.iv=setInterval(function(){ CQ.tleft--; var t=document.getElementById("cqtimer");
  if(t){ if(CQ.tleft<=5)t.classList.add("cq-hot"); if(CQ.tleft<=0){t.classList.add("cq-done");t.textContent="Temps !";} else t.textContent=CQ.tleft; }
  if(CQ.tleft<=0){ cqStopTimer(); sound(false); } },1000); }

function startClassQuiz(){
  cqStopTimer(); CQ.active=false; CQ.winStage="count";
  var ns=[10,15,20], ts=[{l:"20 s",v:20},{l:"30 s",v:30},{l:"45 s",v:45},{l:"Libre",v:0}];
  function draw(){
    var h='<div class="bar"><div class="bar-l"><button class="home-btn" data-act="home">‹</button><span class="mode-name">Quiz de classe</span></div></div>'
      +'<div class="card"><div class="eyebrow">À projeter — réponses sur feuille</div><div class="prompt">Le quiz de la classe</div>'
      +'<p class="cq-setup-p">Projetez l\'écran au tableau. Chaque élève numérote sa feuille de 1 à '+CQ.n+' et écrit A, B, C ou D. À la fin, on corrige tous ensemble, puis on couronne le champion.</p>'
      +'<div class="sub">Nombre de questions</div><div class="chips" id="cqn">';
    ns.forEach(function(n){ h+='<button class="chip'+(CQ.n===n?" sel":"")+'" data-n="'+n+'">'+n+'</button>'; });
    h+='</div><div class="sub">Temps par question</div><div class="chips" id="cqt">';
    ts.forEach(function(t){ h+='<button class="chip'+(CQ.secs===t.v?" sel":"")+'" data-t="'+t.v+'">'+t.l+'</button>'; });
    h+='</div><button class="cont" id="cqgo">Lancer le quiz ›</button></div>';
    app.innerHTML=h;
    app.querySelectorAll("#cqn .chip").forEach(function(b){ b.onclick=function(){ CQ.n=+b.dataset.n; draw(); }; });
    app.querySelectorAll("#cqt .chip").forEach(function(b){ b.onclick=function(){ CQ.secs=+b.dataset.t; draw(); }; });
    document.getElementById("cqgo").onclick=function(){ try{if(!actx)actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} cqBegin(); };
  }
  draw();
}
function cqBegin(){ CQ.q=pick(REP_MCQ,CQ.n); CQ.i=0; CQ.phase="quiz"; CQ.winStage="count"; CQ.top=CQ.n; cqRender(); }
function cqRender(){ if(CQ.phase==="quiz")cqQuestion(false); else if(CQ.phase==="correction")cqQuestion(true); else cqWinner(); }

function cqQuestion(showAnswer){
  CQ.active=true;
  var q=CQ.q[CQ.i], L=["A","B","C","D"], last=(CQ.i===CQ.n-1);
  var h='<div class="cq-top"><button class="home-btn" data-act="home">‹</button>'
    +'<span class="cq-phase'+(showAnswer?" corr":"")+'">'+(showAnswer?"Correction":"Quiz de classe")+'</span>'
    +'<span class="cq-counter">'+(CQ.i+1)+' / '+CQ.n+'</span></div>';
  if(!showAnswer && CQ.secs>0) h+='<div class="cq-timerwrap"><div class="cq-timer" id="cqtimer">'+CQ.secs+'</div></div>';
  h+='<div class="cq-card"><div class="cq-q">'+q.q+'</div><div class="cq-opts">';
  q.c.forEach(function(c,i){ h+='<div class="cq-opt'+(showAnswer&&i===q.a?" cq-ok":"")+'"><span class="cq-letter">'+L[i]+'</span><span class="cq-text">'+esc(c)+'</span>'+(showAnswer&&i===q.a?'<span class="cq-check">✓</span>':'')+'</div>'; });
  h+='</div>';
  if(showAnswer && q.e) h+='<div class="cq-explain">'+q.e+'</div>';
  h+='</div><div class="cq-nav">';
  if(CQ.i>0) h+='<button class="cq-btn ghost2" data-cq="prev">‹ Précédent</button>';
  if(!showAnswer) h+='<button class="cq-btn" data-cq="next">'+(last?"Passer à la correction ›":"Question suivante ›")+'</button>';
  else h+='<button class="cq-btn" data-cq="next">'+(last?"Désigner le vainqueur 🏆":"Suivant ›")+'</button>';
  h+='</div><div class="cq-hint">Astuce : barre d\'espace ou flèche → pour avancer</div>';
  app.innerHTML=h;
  app.querySelectorAll("[data-cq]").forEach(function(b){ b.onclick=function(){ cqAction(b.dataset.cq); }; });
  if(!showAnswer && CQ.secs>0){ CQ.tleft=CQ.secs; cqStartTimer(); } else cqStopTimer();
}
function cqAction(a){
  if(a==="prev"){ if(CQ.i>0){CQ.i--;cqRender();} return; }
  if(a==="next"){
    if(CQ.phase==="quiz"){ if(CQ.i<CQ.n-1){CQ.i++;cqRender();} else {CQ.phase="correction";CQ.i=0;cqStopTimer();sound("good");cqRender();} }
    else if(CQ.phase==="correction"){ if(CQ.i<CQ.n-1){CQ.i++;cqRender();} else {CQ.phase="winner";CQ.top=CQ.n;CQ.winStage="count";cqRender();} }
  }
}
function cqWinner(){
  CQ.active=false; cqStopTimer();
  if(CQ.winStage==="champion"){ cqChampion(); return; }
  var h='<div class="cq-top"><button class="home-btn" data-act="home">‹</button><span class="cq-phase win">Le podium</span><span></span></div>'
    +'<div class="cq-card cq-count"><div class="cq-count-q">Qui a obtenu…</div>'
    +'<div class="cq-count-n">'+CQ.top+'<span class="cq-count-tot"> / '+CQ.n+'</span></div>'
    +'<div class="cq-count-h">…bonnes réponses ? Levez la main !</div>'
    +'<div class="cq-nav2"><button class="cq-btn lite" data-cq="down"'+(CQ.top<=0?" disabled":"")+'>Personne, on descend ▼</button>'
    +'<button class="cq-btn" data-cq="crown">On a un champion ! ✋</button></div></div>';
  app.innerHTML=h;
  app.querySelectorAll("[data-cq]").forEach(function(b){ b.onclick=function(){
    if(b.dataset.cq==="down"){ if(CQ.top>0){CQ.top--;cqWinner();} }
    else { CQ.winStage="champion"; cqChampion(); } }; });
}
function cqChampion(){
  CQ.active=false;
  var h='<div class="cq-top"><button class="home-btn" data-act="home">‹</button><span class="cq-phase win">Champion</span><span></span></div>'
    +'<div class="cq-card cq-champ"><div class="cq-trophy">🏆</div><div class="cq-champ-h">Champion de la classe</div>'
    +'<input class="cq-name" id="cqname" placeholder="Nom du / des gagnant(s)"/>'
    +'<div class="cq-champ-score">'+CQ.top+' / '+CQ.n+' bonnes réponses</div>'
    +'<button class="cq-btn" data-cq="reveal">Couronner</button><div id="cqfinal"></div></div>';
  app.innerHTML=h;
  document.querySelector("[data-cq=reveal]").onclick=function(){
    var nm=(document.getElementById("cqname").value||"").trim()||"La classe"; sound("win");
    document.getElementById("cqfinal").innerHTML='<div class="cq-winner-name">'+esc(nm)+'</div><div class="cq-confetti">🎉</div>'
      +'<div class="cq-nav2"><button class="cq-btn lite" data-act="home">Accueil</button><button class="cq-btn" data-cq="again">Rejouer un quiz</button></div>';
    var ag=document.querySelector("[data-cq=again]"); if(ag)ag.onclick=function(){ startClassQuiz(); };
  };
}
document.addEventListener("keydown",function(e){ if(!CQ.active)return;
  if(e.code==="Space"||e.code==="ArrowRight"){ e.preventDefault(); cqAction("next"); }
  else if(e.code==="ArrowLeft"){ e.preventDefault(); cqAction("prev"); } });

/* ============ BILAN ============ */
function bilan(timeout){
  stopTimer(); sound("win");
  var msg;
  if(timeout) msg="Le temps est écoulé ! Comme le jour J, l'important est de gérer son temps. Recommence pour aller plus vite.";
  else if(S.score>=110) msg="Excellent ! Tu maîtrises l'épreuve. Continue comme ça.";
  else if(S.score>=60) msg="Bon travail. Refais un tour pour viser encore plus haut.";
  else msg="C'est un début. Reprends les explications et recommence : tu vas progresser vite.";
  app.innerHTML='<div class="bar"><div class="bar-l"><button class="home-btn" data-act="home">‹</button><span class="mode-name">'+esc(S.label)+'</span></div></div>'
   +'<div class="card bilan"><div class="eyebrow">Bilan de la session</div><div class="big-score">'+S.score+' points</div>'
   +'<div class="explain" style="text-align:left">'+msg+'</div>'
   +'<button class="cont" data-act="home">Revenir à l\'accueil</button></div>';
}

function brevetBilan(){
  stopTimer(); sound("win");
  var total=0;
  S.brevet.sec.forEach(function(s){ s.pct=s.max?Math.round(100*s.earned/s.max):0; if(s.pct>100)s.pct=100; total+=s.pct*s.w/100; });
  total=Math.round(total);
  var rows=S.brevet.sec.map(function(s){
    var cls=s.pct>=65?"bf-good":(s.pct>=40?"bf-mid":"bf-low");
    return '<div class="brow"><span class="blab">'+s.label+' <em>'+s.w+'%</em></span>'
      +'<span class="bbar"><span class="bfill '+cls+'" style="width:'+s.pct+'%"></span></span>'
      +'<span class="bpct">'+s.pct+'%</span></div>';
  }).join("");
  var msg=total>=80?"Excellent niveau — prêt(e) pour le jour J !":total>=50?"Bon niveau d'ensemble. Travaille en priorité les domaines en orange ou rouge.":"Reprends les domaines en rouge et recommence : c'est comme ça qu'on progresse.";
  app.innerHTML='<div class="bar"><div class="bar-l"><button class="home-btn" data-act="home">‹</button><span class="mode-name">Brevet blanc</span></div></div>'
   +'<div class="card bilan"><div class="eyebrow">Brevet blanc — ton bulletin</div>'
   +'<div class="big-score">'+total+'<span class="hundred"> / 100</span></div>'
   +'<div class="bullet">'+rows+'</div>'
   +'<div class="explain" style="text-align:left;margin-top:14px">'+msg+'</div>'
   +'<button class="cont" data-act="home">Revenir à l\'accueil</button></div>';
  S.brevet=null;
}

/* ============ ACCUEIL ============ */
function home(){
  stopTimer(); cqStopTimer(); CQ.active=false; S.steps=[]; S.timer=false;
  var modes=[
   {n:"Mode 1",t:"Doc Express",d:"Un document, 4 questions : identifier, prélever, expliquer, rédiger.",f:"startDoc"},
   {n:"Mode 2 · le cœur",t:"Réponse longue",d:"Construire un développement étape par étape, comme à l'épreuve.",f:"startLongue"},
   {n:"Mode 3",t:"Repères",d:"Dates, événements, notions, et frises à remettre dans l'ordre.",f:"startRepere"},
   {n:"Mode 4",t:"Croquis / schéma",d:"Trouver le titre et compléter la légende d'un croquis de géo.",f:"startCroquis"},
   {n:"Mode 5",t:"EMC",d:"Une situation concrète : acteurs, problème, valeur, solution, justification.",f:"startEMC"},
   {n:"Mode 6",t:"Réponse à corriger",d:"Devenir correcteur : repérer hors-sujet, dates fausses, phrases vagues.",f:"startCorrige"}
  ];
  var h='<header class="hero"><div class="kicker">Le Grand Défi Brevet</div>'
   +'<h1 class="serif">L\'Atelier <span class="pen">du Brevet</span></h1>'
   +'<p>Histoire · Géographie · EMC — des exercices comme à l\'épreuve : analyser un document, rédiger, classer, justifier. Pas seulement des QCM.</p></header>'
   +'<div class="modes">';
  modes.forEach(function(m){ h+='<button class="mode-card" data-go="'+m.f+'"><div class="mc-num">'+m.n+'</div><div class="mc-title">'+m.t+'</div><div class="mc-desc">'+m.d+'</div></button>'; });
  h+='<button class="mode-card exam" data-go="startBrevet"><div class="mc-num">Épreuve blanche ⏱</div><div class="mc-title">Brevet blanc</div><div class="mc-desc">20 min chrono : repères, document, croquis, réponse longue et EMC. Bulletin noté sur 100, par domaine.</div></button>';
  h+='<button class="mode-card classquiz" data-go="startClassQuiz"><div class="mc-num">À projeter · toute la classe 🏆</div><div class="mc-title">Quiz de classe</div><div class="mc-desc">Vous lancez au tableau, les élèves répondent sur leur feuille, on corrige ensemble et on couronne le champion.</div></button>';
  h+='</div><div class="foot">Révision libre · aucune donnée enregistrée · sons activables d\'un clic</div>';
  app.innerHTML=h;
  app.querySelectorAll("[data-go]").forEach(function(b){ b.onclick=function(){ try{if(!actx)actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} window[b.dataset.go](); }; });
}

home();
</script>
